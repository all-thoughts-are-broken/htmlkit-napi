default_install_hook_types: [pre-commit]
ci:
  autofix_prs: true
  autoupdate_branch: master
  autoupdate_schedule: monthly
repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.1
    hooks:
      - id: clang-format
        args:
          - --style=file
          - -i
          - core/*.cpp
          - core/*.h
          - src/*.cpp
        stages: [pre-commit]
