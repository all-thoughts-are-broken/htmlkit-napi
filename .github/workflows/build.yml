name: Build

on:
  push:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.triplet }}
    runs-on: ${{ matrix.runner }}
    env:
      VCPKG_TARGET_TRIPLET: ${{ matrix.triplet }}
      CMAKE_GENERATOR_PLATFORM: ${{ matrix.generator_platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-2022
            triplet: x64-windows-static
            generator_platform: ''
            native: htmlkit-napi.win32-x64-msvc.node
          - os: windows
            runner: windows-2022
            triplet: arm64-windows-static
            generator_platform: ARM64
            native: htmlkit-napi.win32-arm64-msvc.node
          - os: linux
            runner: ubuntu-24.04
            triplet: x64-linux
            generator_platform: ''
            native: htmlkit-napi.linux-x64-gnu.node
          - os: linux
            runner: ubuntu-24.04-arm
            triplet: arm64-linux
            generator_platform: ''
            native: htmlkit-napi.linux-arm64-gnu.node

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf autoconf-archive automake build-essential libtool nasm ninja-build

      - name: Install vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Verify Windows native dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dumpbin = Get-Command dumpbin.exe -ErrorAction SilentlyContinue
          if (-not $dumpbin) {
            Write-Warning "dumpbin.exe was not found; skipping dependency verification."
            exit 0
          }
          $deps = & $dumpbin.Source /DEPENDENTS build\Release\htmlkit.node
          $deps | Out-String | Write-Host
          $forbidden = '(?i)(vcruntime|msvcp|ucrtbase|api-ms-win-crt|cairo|fontconfig|pango|glib|gobject|harfbuzz|freetype|jpeg|png|webp|avif|gumbo|fmt)'
          if (($deps -join "`n") -match $forbidden) {
            throw "htmlkit.node has forbidden dynamic dependencies."
          }

      - name: Verify Linux native dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          ldd build/Release/htmlkit.node | tee ldd.txt
          if grep -Ei 'build/vcpkg_installed|libstdc\+\+|libgcc_s|libcairo|libpango|libfontconfig|libglib|libgobject|libharfbuzz|libfreetype|libjpeg|libpng|libwebp|libavif|libgumbo|libfmt' ldd.txt; then
            echo "htmlkit.node has forbidden dynamic dependencies." >&2
            exit 1
          fi

      - name: Test
        if: matrix.triplet == 'x64-windows-static' || matrix.triplet == 'x64-linux' || matrix.triplet == 'arm64-linux'
        run: npm test

      - name: Prepare native artifact
        run: npm run artifact

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native }}
          path: artifacts/${{ matrix.native }}
          if-no-files-found: error
